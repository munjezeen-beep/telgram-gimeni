<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ربط حساب تليجرام - الخطوة 1</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Cairo', sans-serif; background-color: #0f172a; color: #f8fafc; }
        .glass { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.1); }
    </style>
</head>
<body class="p-4 md:p-8 flex items-center justify-center min-h-screen">
    <div class="glass w-full max-w-md p-8 rounded-3xl shadow-xl">
        <div class="flex justify-between items-center mb-6">
            <h1 class="text-2xl font-bold text-teal-400">ربط حساب تليجرام</h1>
            <a href="/" class="text-slate-400 hover:text-teal-400">
                <i class="fas fa-home"></i>
            </a>
        </div>
        
        <p class="text-slate-400 text-sm mb-6">الخطوة 1: أدخل بيانات الحساب من <a href="https://my.telegram.org" target="_blank" class="text-teal-400 hover:underline">my.telegram.org</a></p>
        
        <form id="step1Form" class="space-y-4">
            <div>
                <label class="text-xs text-slate-400 block mb-2">رقم الهاتف (مع مفتاح الدولة)</label>
                <input id="phone" type="text" placeholder="967XXXXXXXXX" required class="w-full bg-slate-900 border border-slate-700 p-3 rounded-xl text-white focus:ring-2 focus:ring-teal-500 outline-none">
            </div>
            
            <div>
                <label class="text-xs text-slate-400 block mb-2">API ID</label>
                <input id="api_id" type="number" placeholder="123456" required class="w-full bg-slate-900 border border-slate-700 p-3 rounded-xl text-white focus:ring-2 focus:ring-teal-500 outline-none">
            </div>
            
            <div>
                <label class="text-xs text-slate-400 block mb-2">API Hash</label>
                <input id="api_hash" type="text" placeholder="abcdef1234567890" required class="w-full bg-slate-900 border border-slate-700 p-3 rounded-xl text-white focus:ring-2 focus:ring-teal-500 outline-none">
            </div>
            
            <div>
                <label class="text-xs text-slate-400 block mb-2">مجموعة التنبيهات (اختياري)</label>
                <input id="alert_group" type="text" placeholder="https://t.me/..." class="w-full bg-slate-900 border border-slate-700 p-3 rounded-xl text-white focus:ring-2 focus:ring-teal-500 outline-none">
            </div>
            
            <button id="sendCodeBtn" type="submit" class="w-full bg-teal-500 hover:bg-teal-600 text-slate-900 font-bold p-3 rounded-xl transition mt-6">
                إرسال رمز التحقق
            </button>
        </form>
        
        <div id="message" class="mt-4 text-center text-sm"></div>
    </div>

    <script>
        document.getElementById('step1Form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('sendCodeBtn');
            btn.disabled = true;
            btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> جاري الإرسال...';
            
            const data = {
                phone: document.getElementById('phone').value,
                api_id: document.getElementById('api_id').value,
                api_hash: document.getElementById('api_hash').value,
                alert_group: document.getElementById('alert_group').value
            };
            
            try {
                const res = await fetch('/account/add_step1', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify(data)
                });
                const result = await res.json();
                
                if (result.status === 'success') {
                    // تخزين رقم الهاتف في localStorage للخطوة التالية
                    localStorage.setItem('pending_phone', data.phone);
                    window.location.href = '/account/add_step2';
                } else {
                    alert('فشل الإرسال: ' + result.msg);
                }
            } catch (err) {
                alert('خطأ في الاتصال بالسيرفر');
            } finally {
                btn.disabled = false;
                btn.innerHTML = 'إرسال رمز التحقق';
            }
        });
    </script>
</body>
</html>
