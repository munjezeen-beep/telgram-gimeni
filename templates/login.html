<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>دخول | رادار الخليج الذكي</title>
    <!-- تضمين المكتبات الأساسية مع ضمان التحميل -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&display=swap" rel="stylesheet">
    
    <style>
        * {
            box-sizing: border-box;
            font-family: 'Cairo', sans-serif;
        }
        body { 
            background: #020617;
            background-image: 
                radial-gradient(at 0% 0%, hsla(222,47%,11%,1) 0, transparent 50%), 
                radial-gradient(at 50% 0%, hsla(187,92%,39%,0.15) 0, transparent 50%),
                radial-gradient(at 100% 0%, hsla(222,47%,11%,1) 0, transparent 50%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0;
            overflow: hidden;
        }
        .login-card { 
            background: rgba(15, 23, 42, 0.6); 
            backdrop-filter: blur(16px) saturate(180%);
            -webkit-backdrop-filter: blur(16px) saturate(180%);
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }
        input:focus {
            box-shadow: 0 0 15px rgba(45, 212, 191, 0.2);
        }
        @keyframes subtle-float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-8px); }
        }
        .float-icon { animation: subtle-float 4s ease-in-out infinite; }
    </style>
</head>
<body class="p-4">
    <!-- حلقة إضاءة خلفية -->
    <div class="absolute w-96 h-96 bg-teal-500/10 rounded-full blur-[100px] -z-10 top-1/4"></div>

    <div class="login-card w-full max-w-md p-8 md:p-12 rounded-[2rem] animate-fade-in">
        <div class="text-center mb-10">
            <div class="bg-gradient-to-br from-teal-400/20 to-teal-600/10 w-20 h-20 rounded-2xl flex items-center justify-center mx-auto mb-6 border border-teal-500/30 shadow-lg float-icon">
                <i class="fas fa-satellite-dish text-4xl text-teal-400"></i>
            </div>
            <h1 class="text-3xl font-bold text-white mb-2 tracking-tight">رادار الخليج</h1>
            <p class="text-slate-400 text-sm font-light">بوابة الإدارة السحابية الآمنة</p>
        </div>

        <form method="POST" class="space-y-6">
            <div class="space-y-2">
                <label class="text-xs text-slate-400 mr-1 block font-semibold">البريد الإلكتروني</label>
                <div class="relative group">
                    <i class="fas fa-envelope absolute right-4 top-1/2 -translate-y-1/2 text-slate-500 text-sm group-focus-within:text-teal-400 transition-colors"></i>
                    <input name="email" type="email" required placeholder="admin@example.com" 
                        class="w-full bg-slate-900/40 border border-slate-700 p-4 pr-11 rounded-2xl text-white placeholder:text-slate-600 focus:outline-none focus:border-teal-500/50 transition-all outline-none">
                </div>
            </div>

            <div class="space-y-2">
                <label class="text-xs text-slate-400 mr-1 block font-semibold">كلمة المرور</label>
                <div class="relative group">
                    <i class="fas fa-lock absolute right-4 top-1/2 -translate-y-1/2 text-slate-500 text-sm group-focus-within:text-teal-400 transition-colors"></i>
                    <input name="password" type="password" required placeholder="••••••••" 
                        class="w-full bg-slate-900/40 border border-slate-700 p-4 pr-11 rounded-2xl text-white placeholder:text-slate-600 focus:outline-none focus:border-teal-500/50 transition-all outline-none">
                </div>
            </div>
            
            <button class="w-full bg-teal-500 hover:bg-teal-400 text-slate-950 font-bold py-4 rounded-2xl shadow-xl shadow-teal-500/10 transition-all transform active:scale-[0.98] mt-4 flex items-center justify-center gap-2 group">
                <span>دخول النظام</span>
                <i class="fas fa-arrow-left group-hover:-translate-x-1 transition-transform"></i>
            </button>
        </form>

        {% with messages = get_flashed_messages() %}
            {% if messages %}
                {% for message in messages %}
                <div class="mt-6 p-4 bg-red-500/10 border border-red-500/20 rounded-2xl text-red-400 text-center text-sm flex items-center justify-center gap-2">
                    <i class="fas fa-circle-exclamation text-xs"></i>
                    <span>{{ message }}</span>
                </div>
                {% endfor %}
            {% endif %}
        {% endwith %}

        <div class="mt-12 text-center border-t border-slate-800 pt-6">
            <p class="text-slate-600 text-[10px] uppercase tracking-[0.2em] font-bold">Secure Access Only</p>
        </div>
    </div>

    <!-- Font Awesome Script -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/js/all.min.js"></script>
</body>
</html>
